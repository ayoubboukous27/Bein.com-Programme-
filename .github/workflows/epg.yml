name: Generate beIN EPG

on:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # <- هذا يضمن صلاحية الكتابة على المستودع

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Generate EPG
        run: python scripts/generate_epg.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add output/guide.xml

          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update beIN EPG"
          git push
