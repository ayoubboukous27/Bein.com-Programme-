name: Generate Programme-TV EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

      - name: Download WebGrab+Plus
        run: |
          wget https://webgrabplus.com/sites/default/files/download/SW/V5.6.0/WebGrabPlus_5.6_install.tar.gz
          tar -xzf WebGrabPlus_5.6_install.tar.gz

      - name: Install WebGrab+Plus
        run: |
          chmod +x install.sh
          ./install.sh

      - name: Prepare WebGrab config
        run: |
          mkdir -p ~/.wg++
          cp siteini/programme-tv.net.ini ~/.wg++/
          cp channels/programme-tv.net.channels.xml ~/.wg++/channels.xml

          cat > ~/.wg++/WebGrab++.config.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <settings>
            <filename>guide.xml</filename>
            <mode>n</mode>
            <postprocess grab="y" run="n">mdb</postprocess>
            <user-agent>Mozilla/5.0</user-agent>
          </settings>

          <channels>
            <channel update="i">channels.xml</channel>
          </channels>
          EOF

      - name: Run WebGrab+Plus
        run: |
          ~/.wg++/run.net.sh

      - name: Copy output
        run: |
          mkdir -p output
          find ~/.wg++ -name "*.xml" -type f
          cp ~/.wg++/guide.xml output/guide_programme_tv.xml

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add output/guide_programme_tv.xml

          if ! git diff --cached --quiet; then
            git commit -m "Update Programme-TV EPG"
            git push
          fi
