name: Generate Programme-TV Net EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget tar mono-complete unzip

      - name: Download WebGrab+Plus Linux
        run: |
          wget https://webgrabplus.com/sites/default/files/download/SW/V5.6.0/WebGrabPlus_5.6_install.tar_0.gz
          tar -xzf WebGrabPlus_5.6_install.tar_0.gz
          chmod +x .wg++/install.sh
          .wg++/install.sh

      - name: Copy config and channels
        run: |
          mkdir -p ~/.wg++
          cp siteini/programme-tv.net.ini ~/.wg++/
          cp channels/programme-tv.net.channels.xml ~/.wg++/channels.xml

          cat > ~/.wg++/WebGrab++.config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <settings>
            <filename>guide_programme_tv.xml</filename>
            <mode>n</mode>
            <postprocess grab="y" run="n">mdb</postprocess>
            <user-agent>Mozilla/5.0</user-agent>
          </settings>
          <channels>
            <channel update="i">channels.xml</channel>
          </channels>
          EOF

      - name: Run WebGrab+Plus
        run: |
          chmod +x ~/.wg++/run.net.sh
          ~/.wg++/run.net.sh

      - name: Copy output guide
        run: |
          mkdir -p output
          cp ~/.wg++/guide_programme_tv.xml output/guide_programme_tv.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/guide_programme_tv.xml
          git diff-index --quiet HEAD || git commit -m "Update Programme-TV EPG"
          git pull --rebase origin main
          git push origin main
