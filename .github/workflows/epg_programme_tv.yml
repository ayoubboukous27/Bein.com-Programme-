name: Generate Programme TV Net EPG

on:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Wine (WebGrab++ requires Windows binary)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y wine64 wine32

      - name: Download WebGrab++ latest Windows binary
        run: |
          wget https://github.com/TVGamesNL/WebGrabPlusPlus/releases/download/v2.0.0/WebGrab++.exe -O WebGrab++.exe

      - name: Run WebGrab++ for Programme TV Net
        run: |
          wine WebGrab++.exe siteini/programme-tv.net.ini -c channels/programme-tv.net.channels.xml -o output/guide_programme_tv.xml

      - name: Commit & Push updated guide
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/guide_programme_tv.xml
          git diff-index --quiet HEAD || git commit -m "Update Programme TV Net EPG"
          git pull --rebase origin main
          git push origin main
