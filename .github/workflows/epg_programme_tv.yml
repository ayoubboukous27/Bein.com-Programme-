name: Generate Programme TV Net EPG

on:
  schedule:
    - cron: "0 5 * * *"  # يومياً الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Programme TV Net EPG script
        run: |
          python scripts/generate_programme_tv.py

      - name: Commit & Push updated guide
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/guide_programme_tv.xml
          git diff-index --quiet HEAD || git commit -m "Update Programme TV Net EPG"
          git pull --rebase origin main
          git push origin main
