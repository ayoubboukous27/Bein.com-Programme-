name: Generate Programme-TV Net EPG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine64 wine32 unzip wget

      - name: Download WebGrab+Plus Windows
        run: |
          wget https://webgrabplus.com/sites/default/files/download/SW/V5.6.0/WebGrabPlus_5.6_install.zip -O WebGrabPlus_5.6_install.zip
          unzip WebGrabPlus_5.6_install.zip -d webgrab

      - name: Install WebGrab+Plus silently
        run: |
          cd webgrab
          wine WebGrabPlus_5.6_install.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART

      - name: Prepare config and channels
        run: |
          mkdir -p ~/.wg++
          cp siteini/programme-tv.net.ini ~/.wg++/
          cp channels/programme-tv.net.channels.xml ~/.wg++/channels.xml

          cat > ~/.wg++/WebGrab++.config.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <filename>guide.xml</filename>
            <mode>n</mode>
          </settings>
          <channels>
            <channel update="i">channels.xml</channel>
          </channels>
          EOF

      - name: Run WebGrab+Plus
        run: |
          EXE=$(find ~/.wine -iname "WebGrab+Plus.exe" | head -1)
          wine "$EXE" ~/.wg++/programme-tv.net.ini

      - name: Copy generated guide
        run: |
          mkdir -p output
          GUIDE=$(find ~/.wine -iname "guide.xml" | head -1)
          cp "$GUIDE" output/guide_programme_tv.xml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/guide_programme_tv.xml
          git diff-index --quiet HEAD || git commit -m "Update Programme-TV EPG"
          git pull --rebase origin main
          git push origin main
